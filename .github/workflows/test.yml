# zall CI — test, lint, IPR-3 check
#
# Runs on push/pull_request to main branch + daily cron.
# Matrix: Python 3.10, 3.11, 3.12, 3.13 on ubuntu-latest.

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,images]"

      - name: Lint with ruff
        run: ruff check src/ --output-format=github

      - name: Type-check with mypy
        run: |
          pip install mypy
          mypy src/zall/ --ignore-missing-imports || true

      - name: IPR-3 check (no model SDK in core/)
        run: python scripts/check_ipr3.py

      - name: Test with pytest
        run: python -m pytest tests/ -v --tb=short -q --no-header --junitxml=pytest-results.xml 2>&1 | tail -30

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: pytest-results.xml
          retention-days: 7