name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,bs4,images]"
          pip install pyyaml

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy src/zall/ --ignore-missing-imports || true

      - name: Test with pytest
        run: |
          python -m pytest tests/ -q --tb=line \
            --ignore=tests/test_read_file_invariants.py \
            -k "not (test_file_not_found or test_directory_instead_of_file or test_bash_schema_contains_shell_hint)"

      - name: Test with coverage
        run: |
          pip install pytest-cov
          python -m pytest tests/ -q --tb=line --cov=zall --cov-report=term-missing \
            --ignore=tests/test_read_file_invariants.py \
            -k "not (test_file_not_found or test_directory_instead_of_file or test_bash_schema_contains_shell_hint or test_usage_stats or test_streaming_accumulates_correctly or test_streaming_produces_tokens)"

  publish:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}